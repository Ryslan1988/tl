server:
  port: 8080

spring:
  application:
    name: team-lead-game-backend
  datasource:
    url: jdbc:h2:file:./data/team-lead-game;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info
